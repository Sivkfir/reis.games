<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burn the Floor — REI Games Studio</title>
<meta name="description" content="Every tile you leave collapses forever. Reach the exit. Free browser puzzle game by REI Games Studio.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://reis.games/burn-the-floor/">
<meta property="og:title" content="Burn the Floor — REI Games Studio">
<meta property="og:description" content="Every tile you leave collapses forever. Can you reach the exit?">
<meta property="og:image" content="https://reis.games/logo-white.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; overflow-x:hidden; font-family:'Orbitron','Courier New',monospace; }

.game-topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; height:36px;
  background:rgba(0,0,0,0.92);
  border-bottom:1px solid rgba(255,255,255,0.05);
  position:relative; z-index:20;
}
.game-topbar a { color:#555; text-decoration:none; font-size:11px; transition:color .15s; }
.game-topbar a:hover { color:#999; }
.topbar-title { font-size:11px; color:#2a2a2a; }

#game-container {
  position:relative; width:100%;
  height:calc(100vh - 36px);
  height:calc(100dvh - 36px);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; background:#0a0a0a;
}
#wrapper { position:absolute; transform-origin:top left; }
canvas { display:block; touch-action:none; }

/* D-pad */
#dpad {
  position:absolute; bottom:16px; left:16px;
  width:140px; height:140px;
  display:none; z-index:10; touch-action:none;
}
.db {
  position:absolute; width:44px; height:44px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; color:rgba(255,255,255,0.18);
  cursor:pointer; user-select:none; -webkit-user-select:none;
}
.db.pressed { background:rgba(255,255,255,0.11); color:rgba(255,255,255,0.55); }
#db-u { top:0;    left:48px; }
#db-d { top:96px; left:48px; }
#db-l { top:48px; left:0;    }
#db-r { top:48px; left:96px; }

#btn-restart {
  position:absolute; bottom:16px; right:16px;
  width:44px; height:44px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:8px;
  display:none; align-items:center; justify-content:center;
  font-size:18px; color:rgba(255,255,255,0.15);
  cursor:pointer; user-select:none; z-index:10; touch-action:none;
}
#btn-restart.urgent { color:rgba(220,80,50,0.7); border-color:rgba(220,80,50,0.3); }

@media (pointer:coarse) {
  #dpad { display:block; }
  #btn-restart { display:flex; }
  #game-container { touch-action:pan-y; }
  canvas { touch-action:none; }
}

.below-fold { max-width:400px; margin:0 auto; padding-bottom:40px; }
details.htp { border:1px solid rgba(255,255,255,0.05); border-radius:8px; overflow:hidden; margin:16px 20px 0; }
details.htp summary { list-style:none; padding:10px 14px; cursor:pointer; font-size:11px; color:#444; display:flex; align-items:center; gap:8px; user-select:none; }
details.htp summary::-webkit-details-marker { display:none; }
details.htp summary::after { content:'▾'; margin-left:auto; color:#2a2a2a; }
.htp-body { padding:12px 14px; font-size:11px; color:#333; line-height:1.9; border-top:1px solid rgba(255,255,255,0.04); }
.htp-body strong { color:#555; }
.footer { text-align:center; padding:20px; font-size:10px; color:#1e1e1e; border-top:1px solid rgba(255,255,255,0.03); margin-top:16px; }
.footer a { color:#2a2a2a; margin:0 10px; text-decoration:none; }
.footer a:hover { color:#555; }
</style>
</head>
<body>

<div class="game-topbar">
  <a href="../index.html">← REI Games Studio</a>
  <span class="topbar-title">Burn the Floor</span>
</div>

<div id="game-container">
  <div id="wrapper">
    <canvas id="c"></canvas>
    <div id="dpad">
      <div class="db" id="db-u">▲</div>
      <div class="db" id="db-d">▼</div>
      <div class="db" id="db-l">◀</div>
      <div class="db" id="db-r">▶</div>
    </div>
    <div id="btn-restart">↺</div>
  </div>
</div>

<div class="below-fold">
  <details class="htp">
    <summary>🔥 How to Play</summary>
    <div class="htp-body">
      <p><strong>Goal:</strong> Reach the exit.</p>
      <p>Every tile you step off collapses — forever.</p>
      <p>You cannot go back.</p>
      <br>
      <p><strong>Mobile:</strong> D-pad bottom-left. ↺ to restart.</p>
      <p><strong>Desktop:</strong> WASD or arrow keys. R to restart.</p>
    </div>
  </details>
  <div class="footer">
    <a href="../index.html">REI Games Studio</a>
    <a href="../privacy.html">Privacy</a>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  REI Games Studio — Burn the Floor  v0.1
// ════════════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const CELL = 40;
const COLS = 9, ROWS = 11;
const W = COLS * CELL;   // 360
const H = ROWS * CELL;   // 440
canvas.width = W; canvas.height = H;

// ── Levels ─────────────────────────────────────────────────
// '#' void/wall  '.' floor  'S' start  'E' exit
// Each level teaches exactly one idea.
const LEVELS = [

  // Level 1 — "Wake Up"
  // Idea: tiles collapse when you leave them.
  // Zero decisions. Just walk right. Watch the floor disappear behind you.
  {
    title: 'WAKE UP',
    map: [
      '#########',
      '#########',
      '#########',
      '#########',
      '#########',
      '#########',
      '##S..E###',
      '#########',
      '#########',
      '#########',
      '#########',
    ]
  },

  // Level 2 — "No Return"
  // Idea: stepping into a dead end burns the tile you need to escape.
  // Player sees a branch off the main path. Tempting to explore.
  // Going up burns the only tile back. Trapped. Instant understanding.
  {
    title: 'NO RETURN',
    map: [
      '#########',
      '#########',
      '#########',
      '#########',
      '####.####',
      '####.####',
      '##S...E##',
      '#########',
      '#########',
      '#########',
      '#########',
    ]
  },

  // Level 3 — "The Turn"
  // Idea: movement has direction. You commit. You cannot reverse.
  // The L-shape forces a turn mid-path. Tiles burn on the vertical,
  // then again on the horizontal. First time the player feels the burn trail.
  {
    title: 'THE TURN',
    map: [
      '#########',
      '#########',
      '#########',
      '#########',
      '#########',
      '###S#####',
      '###.#####',
      '###...E##',
      '#########',
      '#########',
      '#########',
    ]
  },

];

// ── State ───────────────────────────────────────────────────
let levelIdx  = 0;
let tileMap   = [];       // [row][col] char
let px = 0,  py = 0;     // player grid position
let rx = 0,  ry = 0;     // render pixel position (lerped)
let fromX = 0, fromY = 0;
let moving    = false;
let moveT     = 0;
let bufDir    = null;     // buffered next direction
const MOVE_MS = 120;

// "c,r" → burn phase 0..1  (0 = just started, 1 = fully void)
const burns   = new Map();
const BURN_MS = 400;

let bumpDX = 0, bumpDY = 0, bumpT = 0;
let flashAlpha  = 0;      // white flash on level complete
let completeFade = 0;
let gameState   = 'playing'; // 'playing' | 'complete'
let isLastLevel = false;
let stuckT      = 0;      // 0..1, rises when player is stuck

let lastTs = 0;

// ── Load level ──────────────────────────────────────────────
function loadLevel(idx) {
  const lvl = LEVELS[idx];
  tileMap = lvl.map.map(r => r.split(''));
  burns.clear();
  bumpT = 0; flashAlpha = 0; completeFade = 0; stuckT = 0;
  gameState    = 'playing';
  isLastLevel  = (idx === LEVELS.length - 1);

  outer:
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (tileMap[r][c] === 'S') { px = c; py = r; break outer; }

  rx = px * CELL; ry = py * CELL;
  fromX = rx; fromY = ry;
  moving = false; moveT = 0; bufDir = null;
}

// ── Tile helpers ────────────────────────────────────────────
function tile(c, r) {
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return '#';
  return tileMap[r][c];
}
function isBurned(c, r) { return burns.has(`${c},${r}`); }
function canEnter(c, r) {
  const t = tile(c, r);
  return t !== '#' && !isBurned(c, r);
}
function isStuck() {
  if (gameState !== 'playing' || moving) return false;
  const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  return dirs.every(([dx,dy]) => !canEnter(px+dx, py+dy));
}

// ── Movement ────────────────────────────────────────────────
function tryMove(dx, dy) {
  if (gameState !== 'playing') return;
  if (moving) { bufDir = [dx, dy]; return; }

  const nc = px + dx, nr = py + dy;
  if (!canEnter(nc, nr)) {
    bumpDX = dx * 0.3; bumpDY = dy * 0.3; bumpT = 1;
    return;
  }

  // Burn tile being left (S and . tiles only — exit never burns)
  const ct = tile(px, py);
  if (ct === 'S' || ct === '.') burns.set(`${px},${py}`, 0);

  fromX = rx; fromY = ry;
  px = nc; py = nr;
  moving = true; moveT = 0;

  if (tile(px, py) === 'E') {
    setTimeout(() => { gameState = 'complete'; flashAlpha = 1; }, MOVE_MS + 60);
  }
}

function onMoveEnd() {
  moving = false;
  rx = px * CELL; ry = py * CELL;
  if (bufDir) { const [dx,dy] = bufDir; bufDir = null; tryMove(dx, dy); }
  else applyHeld();
}

// ── Input ───────────────────────────────────────────────────
const held = { up:false, down:false, left:false, right:false };
function applyHeld() {
  if (held.up)         tryMove(0, -1);
  else if (held.down)  tryMove(0,  1);
  else if (held.left)  tryMove(-1, 0);
  else if (held.right) tryMove(1,  0);
}

window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (['w','arrowup'].includes(k))    { if(!held.up){held.up=true; tryMove(0,-1);} e.preventDefault(); }
  if (['s','arrowdown'].includes(k))  { if(!held.down){held.down=true; tryMove(0,1);} e.preventDefault(); }
  if (['a','arrowleft'].includes(k))  { if(!held.left){held.left=true; tryMove(-1,0);} e.preventDefault(); }
  if (['d','arrowright'].includes(k)) { if(!held.right){held.right=true; tryMove(1,0);} e.preventDefault(); }
  if (k === 'r') loadLevel(levelIdx);
  if ((k === 'enter' || k === ' ') && gameState === 'complete') advance();
});
window.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (['w','arrowup'].includes(k))    held.up    = false;
  if (['s','arrowdown'].includes(k))  held.down  = false;
  if (['a','arrowleft'].includes(k))  held.left  = false;
  if (['d','arrowright'].includes(k)) held.right = false;
});

function bindBtn(id, dx, dy, dirKey) {
  const el = document.getElementById(id);
  const on  = () => { if(!held[dirKey]){held[dirKey]=true; el.classList.add('pressed'); tryMove(dx,dy);} };
  const off = () => { held[dirKey]=false; el.classList.remove('pressed'); };
  el.addEventListener('touchstart', e=>{e.preventDefault(); on();},  {passive:false});
  el.addEventListener('touchend',   e=>{e.preventDefault(); off();}, {passive:false});
  el.addEventListener('touchcancel',e=>{e.preventDefault(); off();}, {passive:false});
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup',   off);
  el.addEventListener('mouseleave',off);
}
bindBtn('db-u', 0,-1,'up');
bindBtn('db-d', 0, 1,'down');
bindBtn('db-l',-1, 0,'left');
bindBtn('db-r', 1, 0,'right');

const btnR = document.getElementById('btn-restart');
btnR.addEventListener('touchstart', e=>{e.preventDefault(); loadLevel(levelIdx);},{passive:false});
btnR.addEventListener('click', ()=> loadLevel(levelIdx));

canvas.addEventListener('pointerdown', () => {
  if (gameState === 'complete' && completeFade > 0.5) advance();
  else if (isStuck()) loadLevel(levelIdx);
});

function advance() {
  levelIdx = isLastLevel ? 0 : levelIdx + 1;
  loadLevel(levelIdx);
}

// ── Update ──────────────────────────────────────────────────
function update(dt) {
  if (moving) {
    moveT = Math.min(1, moveT + dt / MOVE_MS);
    const e = 1 - Math.pow(1 - moveT, 2); // ease-out quad
    rx = fromX + (px * CELL - fromX) * e;
    ry = fromY + (py * CELL - fromY) * e;
    if (moveT >= 1) onMoveEnd();
  }

  // Advance all burn animations
  for (const [k, v] of burns) burns.set(k, Math.min(1, v + dt / BURN_MS));

  // Bump decay
  if (bumpT > 0) bumpT = Math.max(0, bumpT - dt / 85);

  // Flash decay
  if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - dt / 500);

  // Complete overlay fade
  if (gameState === 'complete') completeFade = Math.min(1, completeFade + dt / 350);

  // Stuck indicator
  if (isStuck()) {
    stuckT = Math.min(1, stuckT + dt / 400);
    btnR.classList.add('urgent');
  } else {
    stuckT = Math.max(0, stuckT - dt / 200);
    btnR.classList.remove('urgent');
  }
}

// ── Draw ────────────────────────────────────────────────────
function draw(ts) {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  // Grid tiles
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t   = tile(c, r);
      const bk  = `${c},${r}`;
      const bp  = burns.get(bk); // undefined | 0..1
      const cx  = c * CELL, cy = r * CELL;

      if (t === '#') continue;           // void — draw nothing
      if (t === 'E') { drawExit(cx, cy, ts); continue; }

      if (bp !== undefined) {
        // Burning tile
        ctx.fillStyle = burnColor(bp);
        ctx.fillRect(cx, cy, CELL, CELL);
        // Hot glow while fresh
        if (bp < 0.4) {
          ctx.save();
          ctx.globalAlpha = (1 - bp / 0.4) * 0.45;
          ctx.shadowColor = '#e06010'; ctx.shadowBlur = 20;
          ctx.fillStyle   = '#c04a08';
          ctx.fillRect(cx + 1, cy + 1, CELL - 2, CELL - 2);
          ctx.restore();
        }
      } else {
        // Intact floor
        ctx.fillStyle = '#1c1c1f';
        ctx.fillRect(cx, cy, CELL, CELL);
        ctx.strokeStyle = 'rgba(255,255,255,0.032)';
        ctx.lineWidth = 1;
        ctx.strokeRect(cx + 0.5, cy + 0.5, CELL - 1, CELL - 1);
      }
    }
  }

  // Player
  const bmpX = bumpT > 0 ? Math.sin(bumpT * Math.PI) * bumpDX * CELL : 0;
  const bmpY = bumpT > 0 ? Math.sin(bumpT * Math.PI) * bumpDY * CELL : 0;
  drawPlayer(rx + CELL / 2 + bmpX, ry + CELL / 2 + bmpY);

  // HUD
  drawHUD();

  // Complete overlay
  if (completeFade > 0) drawComplete(ts);

  // Flash
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${flashAlpha * 0.28})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawPlayer(pcx, pcy) {
  const pr   = CELL * 0.29;
  const glow = stuckT > 0.05
    ? `rgba(${~~(255 - stuckT * 55)},${~~(255 - stuckT * 175)},${~~(255 - stuckT * 195)},0.9)`
    : 'rgba(255,255,255,0.9)';
  const body = stuckT > 0.05
    ? `rgb(${~~(255 - stuckT * 35)},${~~(255 - stuckT * 175)},${~~(255 - stuckT * 195)})`
    : '#ffffff';

  ctx.save();
  ctx.shadowColor = glow; ctx.shadowBlur = 14 + stuckT * 10;
  ctx.fillStyle   = body;
  ctx.beginPath(); ctx.arc(pcx, pcy, pr, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur  = 0;
  ctx.fillStyle   = 'rgba(255,255,255,0.38)';
  ctx.beginPath(); ctx.arc(pcx - pr * 0.28, pcy - pr * 0.28, pr * 0.22, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawExit(cx, cy, ts) {
  ctx.fillStyle = '#1c1c1f';
  ctx.fillRect(cx, cy, CELL, CELL);

  const pulse = 0.72 + 0.28 * Math.sin(ts * 0.0038);
  const EC    = '#f1c40f';

  ctx.save();
  ctx.shadowColor = EC; ctx.shadowBlur = 14 * pulse;
  ctx.fillStyle   = `rgba(241,196,15,${0.06 * pulse})`;
  ctx.fillRect(cx, cy, CELL, CELL);

  // Door frame
  const dw = CELL * 0.48, dh = CELL * 0.60;
  const dx = cx + (CELL - dw) / 2;
  const dy = cy + CELL - dh - 4;
  ctx.strokeStyle = EC; ctx.lineWidth = 2; ctx.globalAlpha = 0.88 * pulse;
  ctx.strokeRect(dx, dy, dw, dh);

  // Handle
  ctx.fillStyle = EC; ctx.globalAlpha = 0.82;
  ctx.beginPath(); ctx.arc(dx + dw * 0.72, dy + dh * 0.5, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawHUD() {
  ctx.font        = '10px Orbitron,monospace';
  ctx.textAlign   = 'right';
  ctx.fillStyle   = 'rgba(255,255,255,0.12)';
  ctx.fillText(`${levelIdx + 1} / ${LEVELS.length}`, W - 8, 16);
  ctx.font        = 'bold 10px Orbitron,monospace';
  ctx.fillStyle   = 'rgba(255,255,255,0.1)';
  ctx.fillText(LEVELS[levelIdx].title, W - 8, 29);

  // Restart hint — brightens when stuck
  const hintAlpha = 0.06 + stuckT * 0.5;
  const hintColor = stuckT > 0.3
    ? `rgba(220,80,50,${hintAlpha})`
    : `rgba(255,255,255,${hintAlpha})`;
  ctx.textAlign   = 'left';
  ctx.font        = '9px Orbitron,monospace';
  ctx.fillStyle   = hintColor;
  ctx.fillText('R — RESTART', 8, H - 8);
}

function drawComplete(ts) {
  ctx.save();
  ctx.globalAlpha = completeFade * 0.75;
  ctx.fillStyle   = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = completeFade;

  ctx.textAlign = 'center';

  const headline = isLastLevel ? 'COMPLETE' : 'FLOOR BURNED';
  const subline  = isLastLevel
    ? 'All levels cleared'
    : `Next: ${LEVELS[levelIdx + 1]?.title ?? ''}`;

  ctx.font        = 'bold 28px Orbitron,monospace';
  ctx.fillStyle   = '#f1c40f';
  ctx.shadowColor = '#f1c40f'; ctx.shadowBlur = 24;
  ctx.fillText(headline, W / 2, H / 2 - 32);
  ctx.shadowBlur  = 0;

  ctx.font        = '10px Orbitron,monospace';
  ctx.fillStyle   = 'rgba(255,255,255,0.25)';
  ctx.fillText(subline, W / 2, H / 2 + 2);

  // Button
  const bp = 0.88 + Math.sin(ts * 0.003) * 0.12;
  ctx.save();
  ctx.translate(W / 2, H / 2 + 54);
  ctx.shadowColor = '#f1c40f'; ctx.shadowBlur = 18 * bp;
  rrect(-88, -23, 176, 46, 11);
  ctx.fillStyle   = 'rgba(26,20,0,0.95)'; ctx.fill();
  ctx.strokeStyle = `rgba(241,196,15,${0.4 + bp * 0.6})`; ctx.lineWidth = 2; ctx.stroke();
  ctx.shadowBlur  = 0;
  ctx.fillStyle   = '#f1c40f'; ctx.font = 'bold 12px Orbitron,monospace';
  ctx.fillText(isLastLevel ? '▶  PLAY AGAIN' : '▶  NEXT LEVEL', 0, 4);
  ctx.restore();

  ctx.globalAlpha = completeFade * 0.22;
  ctx.font        = '9px Orbitron,monospace';
  ctx.fillStyle   = '#fff';
  ctx.fillText('ENTER or tap to continue', W / 2, H / 2 + 114);
  ctx.restore();
  ctx.textAlign = 'left';
}

// ── Helpers ─────────────────────────────────────────────────
function burnColor(p) {
  if (p < 0.22) return lerpRGB([28, 28, 31],  [215, 90, 12],  p / 0.22);
  if (p < 0.58) return lerpRGB([215, 90, 12],  [105, 16,  8],  (p - 0.22) / 0.36);
               return lerpRGB([105, 16,  8],  [ 10, 10, 10],  (p - 0.58) / 0.42);
}
function lerpRGB(a, b, t) {
  return `rgb(${~~(a[0]+(b[0]-a[0])*t)},${~~(a[1]+(b[1]-a[1])*t)},${~~(a[2]+(b[2]-a[2])*t)})`;
}
function rrect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r); ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r); ctx.closePath();
}

// ── Resize ──────────────────────────────────────────────────
const wrapper = document.getElementById('wrapper');
const gc      = document.getElementById('game-container');
function resizeGame() {
  const cw = gc.clientWidth, ch = gc.clientHeight;
  const sc = Math.min(cw / W, ch / H);
  wrapper.style.width     = W + 'px';
  wrapper.style.height    = H + 'px';
  wrapper.style.transform = `scale(${sc})`;
  wrapper.style.top       = ((ch - H * sc) / 2) + 'px';
  wrapper.style.left      = ((cw - W * sc) / 2) + 'px';
}
resizeGame();
window.addEventListener('resize', resizeGame);

// ── Boot ────────────────────────────────────────────────────
loadLevel(0);
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = lastTs ? Math.min(ts - lastTs, 50) : 16;
  lastTs = ts;
  update(dt);
  draw(ts);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
