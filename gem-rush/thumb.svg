<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0a0a28"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="gemGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gemGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="playerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gemFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#90ffcc"/>
      <stop offset="45%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#006633"/>
    </linearGradient>
    <linearGradient id="gemFill2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80f0cc"/>
      <stop offset="45%" stop-color="#00dd77"/>
      <stop offset="100%" stop-color="#005522"/>
    </linearGradient>
    <filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="rgba(0,180,255,0.04)" stroke-width="1">
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="40" y1="0" x2="40" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="300"/>
    <line x1="120" y1="0" x2="120" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="280" y1="0" x2="280" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="300"/>
    <line x1="360" y1="0" x2="360" y2="300"/>
  </g>

  <!-- Main gem glow halos -->
  <ellipse cx="200" cy="145" rx="55" ry="55" fill="url(#gemGlow)" filter="url(#blur8)"/>
  <ellipse cx="95" cy="80" rx="36" ry="36" fill="url(#gemGlow2)" filter="url(#blur8)"/>
  <ellipse cx="320" cy="210" rx="30" ry="30" fill="url(#gemGlow2)" filter="url(#blur4)"/>

  <!-- Player glow -->
  <ellipse cx="290" cy="110" rx="34" ry="34" fill="url(#playerGlow)" filter="url(#blur8)"/>

  <!-- Trail dots behind player -->
  <circle cx="258" cy="118" r="5" fill="rgba(0,212,255,0.2)"/>
  <circle cx="270" cy="115" r="7" fill="rgba(0,212,255,0.3)"/>
  <circle cx="280" cy="112" r="9" fill="rgba(0,212,255,0.4)"/>

  <!-- Player (cyan circle) -->
  <circle cx="290" cy="110" r="16" fill="rgba(0,212,255,0.25)"/>
  <circle cx="290" cy="110" r="13" fill="#00d4ff"/>
  <circle cx="285" cy="105" r="4" fill="rgba(160,244,255,0.9)"/>

  <!-- Main center gem -->
  <g transform="translate(200,145) rotate(45)">
    <rect x="-20" y="-20" width="40" height="40" fill="url(#gemFill)"/>
    <rect x="-10" y="-20" width="8" height="14" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Top-left gem (smaller) -->
  <g transform="translate(95,80) rotate(45)">
    <rect x="-14" y="-14" width="28" height="28" fill="url(#gemFill2)"/>
    <rect x="-7" y="-14" width="5" height="10" fill="rgba(255,255,255,0.25)"/>
  </g>
  <!-- Life ring on top-left gem -->
  <circle cx="95" cy="80" r="20" fill="none" stroke="rgba(0,255,136,0.3)" stroke-width="1.5" stroke-dasharray="90 36"/>

  <!-- Bottom-right gem (smaller, orange-tinted = warning state) -->
  <g transform="translate(320,210) rotate(45)">
    <rect x="-12" y="-12" width="24" height="24" fill="#ff8844"/>
    <rect x="-6" y="-12" width="4" height="9" fill="rgba(255,255,255,0.3)"/>
  </g>
  <ellipse cx="320" cy="210" rx="20" ry="20" fill="none" filter="url(#blur2)" stroke="rgba(255,136,68,0.5)" stroke-width="1"/>

  <!-- Combo counter UI -->
  <rect x="12" y="12" width="90" height="34" rx="6" fill="rgba(0,0,20,0.75)"/>
  <text x="20" y="24" font-family="monospace" font-size="8" fill="#334" font-weight="bold">COMBO</text>
  <text x="20" y="40" font-family="monospace" font-size="18" fill="#ffaa00" font-weight="bold">×7</text>

  <!-- Score UI -->
  <rect x="298" y="12" width="90" height="34" rx="6" fill="rgba(0,0,20,0.75)"/>
  <text x="306" y="24" font-family="monospace" font-size="8" fill="#334" font-weight="bold">SCORE</text>
  <text x="306" y="40" font-family="monospace" font-size="16" fill="#00d4ff" font-weight="bold">420</text>

  <!-- Timer bar -->
  <rect x="0" y="0" width="400" height="4" fill="rgba(0,0,0,0.5)"/>
  <rect x="0" y="0" width="240" height="4" fill="#00d4ff"/>

  <!-- Particle burst from main gem -->
  <circle cx="218" cy="128" r="3" fill="rgba(0,255,136,0.7)"/>
  <circle cx="230" cy="120" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="185" cy="130" r="2.5" fill="rgba(0,255,136,0.6)"/>
  <circle cx="210" cy="168" r="2" fill="rgba(0,255,136,0.5)"/>
  <circle cx="222" cy="162" r="3" fill="rgba(144,255,204,0.6)"/>

  <!-- Title text -->
  <text x="200" y="254" font-family="monospace" font-size="34" font-weight="bold" fill="#00d4ff" text-anchor="middle" opacity="0.9">GEM RUSH</text>
  <text x="200" y="272" font-family="monospace" font-size="10" fill="#334" text-anchor="middle">60 seconds · keep your combo alive</text>

  <!-- Vignette -->
  <radialGradient id="vig" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,18,0.55)"/>
  </radialGradient>
  <rect width="400" height="300" fill="url(#vig)"/>
</svg>
