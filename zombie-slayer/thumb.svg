<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="lantern" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#2a4a0a" stop-opacity="1"/>
      <stop offset="60%" stop-color="#0d1a06" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="30%">
      <stop offset="0%" stop-color="#ff9020" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#060e02"/>

  <!-- Trees -->
  <g fill="#0a1505" opacity="0.95">
    <ellipse cx="30" cy="120" rx="22" ry="55"/>
    <ellipse cx="55" cy="90" rx="18" ry="45"/>
    <ellipse cx="355" cy="110" rx="20" ry="52"/>
    <ellipse cx="380" cy="85" rx="16" ry="42"/>
    <ellipse cx="320" cy="130" rx="18" ry="48"/>
    <ellipse cx="80" cy="140" rx="16" ry="40"/>
    <ellipse cx="10" cy="200" rx="14" ry="35"/>
    <ellipse cx="390" cy="195" rx="14" ry="35"/>
  </g>

  <!-- Dark overlay (fog of war vignette) -->
  <rect width="400" height="300" fill="url(#lantern)"/>
  <rect width="400" height="300" fill="url(#glow)"/>

  <!-- Player (knight silhouette) -->
  <g transform="translate(195,145)">
    <!-- Body -->
    <rect x="-8" y="0" width="16" height="20" rx="3" fill="#4a7a2a"/>
    <!-- Head -->
    <rect x="-7" y="-14" width="14" height="13" rx="2" fill="#5a8a3a"/>
    <!-- Helmet visor -->
    <rect x="-5" y="-10" width="10" height="4" rx="1" fill="#2a4a15"/>
    <!-- Sword -->
    <rect x="10" y="-18" width="3" height="30" rx="1" fill="#c0c0c0"/>
    <rect x="6" y="-8" width="11" height="3" rx="1" fill="#888"/>
    <!-- Legs -->
    <rect x="-7" y="20" width="6" height="12" rx="2" fill="#3a6a1a"/>
    <rect x="1" y="20" width="6" height="12" rx="2" fill="#3a6a1a"/>
  </g>

  <!-- Zombie 1 -->
  <g transform="translate(255,160)" opacity="0.85">
    <rect x="-5" y="0" width="11" height="16" rx="2" fill="#2a4a1a"/>
    <rect x="-5" y="-12" width="11" height="11" rx="2" fill="#1a3a0a"/>
    <circle cx="0" cy="-6" r="2" fill="#ff3333" opacity="0.9"/>
    <rect x="-4" y="16" width="4" height="10" rx="1" fill="#1a3a0a"/>
    <rect x="1" y="16" width="4" height="10" rx="1" fill="#1a3a0a"/>
    <!-- Arms reaching out -->
    <rect x="11" y="-2" width="14" height="3" rx="1" fill="#1a3a0a"/>
    <rect x="-25" y="-2" width="14" height="3" rx="1" fill="#1a3a0a"/>
  </g>

  <!-- Zombie 2 (darker, further) -->
  <g transform="translate(140,168)" opacity="0.6">
    <rect x="-5" y="0" width="11" height="16" rx="2" fill="#1a3010"/>
    <rect x="-5" y="-11" width="11" height="10" rx="2" fill="#0f2008"/>
    <circle cx="0" cy="-5" r="2" fill="#ff2222" opacity="0.7"/>
    <rect x="-4" y="16" width="4" height="9" rx="1" fill="#0f2008"/>
    <rect x="1" y="16" width="4" height="9" rx="1" fill="#0f2008"/>
    <rect x="12" y="-1" width="12" height="3" rx="1" fill="#0f2008"/>
  </g>

  <!-- Blood splatter -->
  <g fill="#880000" opacity="0.7">
    <circle cx="220" cy="175" r="4"/>
    <circle cx="228" cy="180" r="2.5"/>
    <circle cx="215" cy="182" r="1.5"/>
    <circle cx="232" cy="170" r="2"/>
  </g>

  <!-- Chest (treasure) with glow -->
  <g transform="translate(310,190)">
    <rect x="-12" y="-8" width="24" height="16" rx="2" fill="#5a3a10"/>
    <rect x="-12" y="-8" width="24" height="7" rx="2" fill="#6a4a18"/>
    <rect x="-3" y="-4" width="6" height="8" rx="1" fill="#c8941a"/>
    <ellipse cx="0" cy="-2" rx="14" ry="12" fill="#ffaa00" opacity="0.08"/>
  </g>

  <!-- Title -->
  <text x="200" y="252" font-family="Georgia, serif" font-size="22" font-weight="bold"
    fill="#7aff40" text-anchor="middle" letter-spacing="3"
    style="text-shadow: 0 0 8px #4aff00;">ZOMBIE SLAYER</text>
  <text x="200" y="271" font-family="Georgia, serif" font-size="11"
    fill="#559933" text-anchor="middle" letter-spacing="2">REI GAMES STUDIO</text>
</svg>
